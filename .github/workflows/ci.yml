name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm gcc libvulkan-dev libglfw3-dev
      - name: Build all modules
        run: make all
      - name: Run tests
        run: make test
      - name: Lint assembly
        run: make lint || true
